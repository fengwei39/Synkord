version: 2
updates:
	# Go module 更新（backend）
	- package-ecosystem: gomod
		directory: /backend
		schedule:
			interval: weekly
			day: monday
		open-pull-requests-limit: 5
		labels: [dependencies, backend, go]
		commit-message:
			prefix: "deps(backend)"
		groups:
			patch: { patterns: ["*"], update-types: ["minor", "patch"] }

	# Go module 更新（cli）
	- package-ecosystem: gomod
		directory: /synkord-cli
		schedule:
			interval: weekly
			day: monday
		open-pull-requests-limit: 3
		labels: [dependencies, cli, go]
		commit-message:
			prefix: "deps(cli)"

	# npm/pnpm（frontend）
	- package-ecosystem: npm
		directory: /frontend
		schedule:
			interval: weekly
			day: monday
		open-pull-requests-limit: 5
		labels: [dependencies, frontend]
		commit-message:
			prefix: "deps(frontend)"
		groups:
			# 安全更新立即合，feature 每周一批
			security-patches:
				applies-to: security-updates
			production:
				dependency-type: production
				update-types: [minor, patch]
			dev-deps:
				dependency-type: development
				update-types: [minor, patch]

	# GitHub Actions 自身
	- package-ecosystem: github-actions
		directory: /
		schedule:
			interval: weekly
		labels: [dependencies, ci]
		commit-message:
			prefix: "ci"
