# Synkord CI
# PR 触发：后端 (go build/vet/test) + 前端 (tsc + build) + CLI (go build/test)
name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # 后端 Go 服务
  # ----------------------------------------------------------
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  # ----------------------------------------------------------
  # 前端 Vite + Electron
  # ----------------------------------------------------------
  frontend:
    name: Frontend (TS + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # 关键：pnpm 必须先于 setup-node 装，setup-node@v4 需要 pnpm 已就绪才能用 cache: pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build (Vite)
        run: pnpm run build

  # ----------------------------------------------------------
  # CLI 工具
  # ----------------------------------------------------------
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synkord-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: synkord-cli/go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...
