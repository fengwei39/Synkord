# Docker 镜像发布（v*.*.* tag 触发的唯一镜像推送来源）
# 触发：打 tag (v*.*.*) 时执行
#
# 关系说明（[2026-07 修复]）：
#   - 本 workflow 是 v*.*.* tag 推送时构建并推送 Docker 镜像的**唯一**来源
#   - release.yml 内置的 docker job 已永久 `if: false` 跳过，避免重复推送
#   - 镜像由 deploy/docker/docker-compose.yml 引用：ghcr.io/synkord/synkord-core:X.Y.Z
#
# 标签策略：tag 形如 v0.2.0 → 推送
#   - ghcr.io/<owner>/synkord-core:v0.2.0
#   - ghcr.io/<owner>/synkord-core:v0.2.0-<sha>（便于按 commit 精确回溯）
name: Docker Publish (tag)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/synkord-core:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/synkord-core:${{ github.ref_name }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
