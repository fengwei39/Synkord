# Synkord Release
#
# 完整发布闭环：tag (v*.*.*) 触发 → 抽版本号 → 客户端/后端构建 → GitHub Release
#
# 维护者发布流程：
#   1. 合并 dev → main
#   2. ./scripts/bump-version.sh minor     # 同步 VERSION + frontend/package.json
#   3. git commit -m "chore(release): bump version to 0.2.0"
#   4. git tag v0.2.0
#   5. git push origin main --tags        # → 触发本 workflow
#   6. 自动产出：
#      - 客户端 3 个：macOS Apple Silicon DMG、macOS Intel DMG、Windows NSIS
#      - 后端 Go 1 个：synkord-core-linux-amd64
#      - GitHub Release (含 checksums.txt)
#
# Docker 镜像由独立的 .github/workflows/docker-publish.yml 负责（同样 v*.*.* 触发），
# 避免与本 workflow 的 docker job 重复推送。本 workflow 的 docker job 永久 `if: false` 跳过。
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # 创建 release

jobs:
  # --------------------------------------------------------------------------
  # 后端：Linux x64 Go 二进制（部署到唯一后端服务器）
  # 用 -ldflags 注入版本号
  # --------------------------------------------------------------------------
  backend:
    name: Backend (linux-amd64)
    runs-on: ubuntu-latest
    needs: [resolve]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Build
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ../dist
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../dist/synkord-core-linux-amd64 .

      - name: Smoke test
        shell: bash
        run: |
          chmod +x ../dist/synkord-core-linux-amd64
          (../dist/synkord-core-linux-amd64 &) && sleep 2 && \
            curl -sf http://localhost:8000/health | head -c 200 && echo "" || true
          pkill -f synkord-core-linux-amd64 || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: synkord-core-linux-amd64
          path: dist/synkord-core-linux-amd64
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # 桌面端：electron-builder 安装包（读 frontend/package.json 的 version）
  # 内置 CLI：通过 extraResources 嵌入到安装包，用户可在终端用 `synkord` 命令
  # --------------------------------------------------------------------------
  desktop:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [resolve]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            platform: mac
            arch: arm64
            goos: darwin
            goarch: arm64
            artifact: client-macos-arm64
          - name: macOS Intel
            os: macos-13
            platform: mac
            arch: x64
            goos: darwin
            goarch: amd64
            artifact: client-macos-x64
          - name: Windows
            os: windows-latest
            platform: win
            arch: x64
            goos: windows
            goarch: amd64
            artifact: client-windows-x64
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # 关键：pnpm 必须先于 setup-node 装，setup-node@v4 需要 pnpm 已就绪才能用 cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Setup Go (for CLI)
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: synkord-cli/go.mod

      # 桌面端内置 CLI：先编译 CLI 到 electron/bin/，再让 electron-builder 把它打进 extraResources
      - name: Build CLI (${{ matrix.name }})
        working-directory: synkord-cli
        shell: bash    # Windows runner 默认 pwsh，bash 语法（[[ ]]、&&、${}）会报 ParserError
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../frontend/electron/bin
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../frontend/electron/bin/synkord${EXT} .
          ls -la ../frontend/electron/bin/

      - name: Build Desktop
        shell: bash
        env:
          # 不做代码签名：用户首次运行会看到 OS 自身的告警
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          pnpm run build
          case "${{ matrix.platform }}" in
            mac) pnpm exec electron-builder --mac --${{ matrix.arch }} ;;
            win) pnpm exec electron-builder --win --${{ matrix.arch }} ;;
          esac

      - name: Upload (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
          if-no-files-found: error

      - name: Upload (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          # 用 *.exe 而非版本硬编码 glob: electron-builder NSIS 实际产物为
          # `${productName} Setup ${version}.exe`(空格),旧的 `Synkord-Setup-*.exe`
          # 因为连字符 vs 空格不匹配触发 `if-no-files-found: error`。对齐 macOS 的 `*.dmg` 风格。
          path: |
            frontend/release/*.exe
            frontend/release/*.zip
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Docker 镜像：tag 触发时构建并推送到 ghcr.io
  # 由 deploy/docker/docker-compose.yml 引用：ghcr.io/synkord/synkord-core:X.Y.Z
  #
  # [2026-07 修复] 镜像推送已迁移到独立的 .github/workflows/docker-publish.yml，
  # 本 job 永久 `if: false` 跳过，避免 v*.*.* tag push 时双 workflow 重复推送。
  # --------------------------------------------------------------------------
  docker:
    name: Docker Image (DISABLED — 镜像由 docker-publish.yml 负责)
    if: false
    runs-on: ubuntu-latest
    needs: [resolve, backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/synkord-core
          tags: |
            type=raw,value=${{ needs.resolve.outputs.version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(needs.resolve.outputs.version, '-') }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # --------------------------------------------------------------------------
  # 解析版本号（最先跑，给所有下游 job 用）
  # --------------------------------------------------------------------------
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      version_stripped: ${{ steps.parse.outputs.version_stripped }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          # tag push 触发：从 GITHUB_REF_NAME 拿版本号（必为 v*.*.* 形式）
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            V="${GITHUB_REF_NAME}"
          else
            V="$(cat VERSION 2>/dev/null || echo 'dev')"
          fi
          # 去掉 v 前缀
          V_STRIPPED="${V#v}"
          echo "version=${V}" >> $GITHUB_OUTPUT
          echo "version_stripped=${V_STRIPPED}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${V} (stripped: ${V_STRIPPED})"

  # --------------------------------------------------------------------------
  # 汇总 + 创建 GitHub Release（含 SHA256SUMS）
  # --------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [backend, desktop, resolve]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * 2>/dev/null | grep -v checksums.txt > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.resolve.outputs.version }}
          tag_name: ${{ needs.resolve.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.version, '-') }}
          body: |
            ## Synkord ${{ needs.resolve.outputs.version }}

            自动构建产物（由 [.github/workflows/release.yml](.github/workflows/release.yml) 产出）。

            ### 客户端（成员安装）
            - **macOS** (Apple Silicon): `Synkord-${{ needs.resolve.outputs.version_stripped }}-arm64.dmg`
            - **macOS** (Intel): `Synkord-${{ needs.resolve.outputs.version_stripped }}-x64.dmg`
            - **Windows**: `Synkord-Setup-${{ needs.resolve.outputs.version_stripped }}-x64.exe`

            客户端首次打开时，在登录页填写管理员给出的服务器域名；登录后也可在 **设置 → 后端连接** 修改。

            ### 服务端（管理员部署）
            部署一台后端，团队成员共享。**推荐 Docker 部署**，详见 [deploy/docker/README.md](deploy/docker/README.md)：

            ```bash
            mkdir -p /opt/synkord && cd /opt/synkord
            curl -fsSL https://codeload.github.com/synkord/synkord/tar.gz/refs/heads/main | \
              tar -xz --strip-components=2 synkord-main/deploy/docker
            cp .env.example .env
            sed -i "s/__REPLACE_WITH_64_HEX_CHARS__/$(openssl rand -hex 32)/" .env
            docker compose up -d
            curl http://localhost:8000/health
            ```

            Docker 镜像：`ghcr.io/synkord/synkord-core:${{ needs.resolve.outputs.version_stripped }}`

            验证：
            ```sh
            sha256sum -c checksums.txt
            ```

            > CLI 工具已内置到桌面端：装好桌面应用后，打开 设置 → CLI 工具 → “安装到 PATH”，即可在终端用 `synkord` 命令。

            ### 更新日志
            自动从 PR 生成。详见下方 release notes。
          files: |
            dist/**
            dist/**/checksums.txt
