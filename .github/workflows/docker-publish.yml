# Docker 镜像持续发布
# 触发：dev 分支 push → 自动构建 latest 镜像到 ghcr.io（staging 用）
# 正式发版仍走 .github/workflows/release.yml（按 tag）
name: Docker Publish (dev)

on:
  push:
    branches: [dev]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/synkord-core:dev
            ghcr.io/${{ github.repository_owner }}/synkord-core:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
