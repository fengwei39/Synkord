# Synkord 自托管部署
# 适用：5-50 人的研发团队，单机或小集群部署
# 资源：1 CPU / 512MB RAM / 10GB 磁盘
#
# 启动：
#   1. cp .env.example .env  &&  vi .env   # 改 JWT_SECRET / MCP_TOKEN / 域名
#   2. docker compose pull                    # 拉取最新镜像（可选）
#   3. docker compose up -d                   # 启动
#   4. docker compose logs -f synkord-core    # 跟踪启动日志
#   5. 访问 https://synkord.yourcompany.com    # 首次用 admin / admin123 登录
#
# 数据备份：
#   docker compose exec synkord-core sqlite3 /app/data/synkord.db ".backup /app/data/backup.db"
#   docker compose cp synkord-core:/app/data/synkord.db ./backup/synkord-$(date +%F).db

services:
  # --------------------------------------------------------------------------
  # Synkord 后端（Go + Gin + SQLite）
  # --------------------------------------------------------------------------
  synkord-core:
    image: ghcr.io/synkord/synkord-core:latest
    container_name: synkord-core
    restart: unless-stopped
    expose:
      - "8000"            # 仅暴露给内部网络（caddy 反代）
    environment:
      - SYNKORD_PORT=8000
      - SYNKORD_DB_PATH=/app/data/synkord.db
      - SYNKORD_JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - SYNKORD_MCP_TOKEN=${MCP_TOKEN:?MCP_TOKEN must be set}
      - SYNKORD_CORS_ORIGINS=${ALLOWED_ORIGINS}
      - TZ=${TZ:-UTC}
    volumes:
      - synkord_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 128M

  # --------------------------------------------------------------------------
  # Caddy 反向代理（HTTPS 终止）
  # 自动申请 / 续期 Let's Encrypt 证书
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2
    container_name: synkord-caddy
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → HTTPS 重定向 + ACME 验证
      - "443:443"   # HTTPS
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      synkord-core:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # 备份 cron（可选）：每天 03:00 把 SQLite 备份到 /backup 卷
  # 启用：删除下面整段 + docker compose up -d backup
  # --------------------------------------------------------------------------
  # backup:
  #   image: alpine:3.20
  #   container_name: synkord-backup
  #   restart: unless-stopped
  #   environment:
  #     - TZ=${TZ:-UTC}
  #     - BACKUP_KEEP_DAYS=30
  #   volumes:
  #     - synkord_data:/source:ro
  #     - synkord_backups:/backup
  #   command: >
  #     sh -c "
  #       echo '0 3 * * * cd /source && sqlite3 synkord.db \".backup /backup/synkord-$$(date +%F-%H%M).db\" && find /backup -name '*.db' -mtime +$${BACKUP_KEEP_DAYS} -delete' > /etc/crontabs/root &&
  #       crond -f -L /dev/stdout
  #     "

volumes:
  synkord_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  # synkord_backups:
  #   driver: local
