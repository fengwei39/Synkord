# CLI 独立发版
# 触发：CLI 目录变更并 push 到 dev/main
# 目的：CLI 改动频繁，不希望每次都要打整个 monorepo 的 tag 才能发版
# 流程：构建 3 平台二进制 → 创建 draft pre-release → 人工确认后 publish
name: CLI Release

on:
  push:
    paths:
      - 'synkord-cli/**'
      - '.github/workflows/cli-release.yml'
    branches: [dev, main]
  workflow_dispatch:        # 手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            asset: synkord-cli-linux-amd64
            binary: synkord
          - os: ubuntu-latest
            arch: arm64
            asset: synkord-cli-linux-arm64
            binary: synkord
          - os: macos-latest
            arch: arm64
            asset: synkord-cli-darwin-arm64
            binary: synkord
          - os: macos-latest
            arch: amd64
            asset: synkord-cli-darwin-amd64
            binary: synkord
          - os: windows-latest
            arch: amd64
            asset: synkord-cli-windows-amd64.exe
            binary: synkord.exe
    defaults:
      run:
        working-directory: synkord-cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: synkord-cli/go.sum
      - name: Test
        run: go test -race -count=1 ./...
      - name: Build
        env:
          GOOS: ${{ matrix.os == 'windows-latest' && 'windows' || (matrix.os == 'macos-latest' && 'darwin' || 'linux') }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p ../dist
          VERSION="v$(cat ../VERSION)"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o ../dist/${{ matrix.asset }} .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          for f in *; do
            [ -f "$f" ] && sha256sum "$f" >> checksums.txt
          done

      - name: Read version
        id: ver
        run: |
          VERSION=$(cat VERSION)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=cli-v${VERSION}" >> $GITHUB_OUTPUT

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: CLI ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          draft: true                # 人工确认后再 publish
          prerelease: true           # CLI 单独发版，标记为 pre-release
          files: |
            dist/**
